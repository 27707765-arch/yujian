# 文件名：nginx.conf
# 用途：Nginx配置文件（部署时根据实际环境调整 uploads 路径）

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream yujian_backend {
        # ip_hash 确保同一客户端始终路由到同一后端实例（WebSocket 粘性会话）
        # 如果改为单实例部署，可移除 ip_hash
        ip_hash;
        server 127.0.0.1:3000;
        # 多实例时取消下一行注释:
        # server 127.0.0.1:3001;
    }

    # HTTP → HTTPS 重定向（生产环境启用）
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }

    server {
        listen       80;
        # listen       443 ssl http2;  # 配置SSL后取消注释
        server_name  localhost;         # ⚠️ 改为你的域名

        # SSL 证书（配置SSL后取消注释）
        # ssl_certificate     /etc/nginx/ssl/yujian.pem;
        # ssl_certificate_key /etc/nginx/ssl/yujian.key;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

        # 上传文件大小限制
        client_max_body_size 20m;

        # API + WebSocket 代理
        location / {
            proxy_pass http://yujian_backend;
            proxy_http_version 1.1;

            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # 常规代理头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # 上传文件静态服务
        location /uploads/ {
            alias /home/app/yujian/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 健康检查不记录日志
        location /health {
            proxy_pass http://yujian_backend;
            access_log off;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
