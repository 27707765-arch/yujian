# 文件名：nginx.conf
# 用途：Nginx配置文件（遇见APP后端 - 阿里云ECS部署）
# 适用：CentOS 7/8, Alibaba Cloud Linux
# 安装路径：/etc/nginx/nginx.conf

worker_processes auto;  # 自动匹配CPU核心数
worker_rlimit_nofile 65535;  # 提高文件描述符上限

events {
    worker_connections 4096;      # 提高连接数（原1024，内测阶段4096足够）
    use epoll;                    # Linux下高效事件模型
    multi_accept on;              # 一次接受多个连接
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ====== 日志格式（含请求耗时、upstream耗时） ======
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct=$upstream_connect_time '
                        'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log detailed;
    error_log  /var/log/nginx/error.log warn;

    # ====== 性能优化 ======
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  75s;
    keepalive_requests 100;

    # ====== Gzip 压缩（减少带宽，提升移动端体验） ======
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;                  # 压缩级别（1-9，5是平衡点）
    gzip_min_length 256;                # 小于256字节不压缩
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml
        font/ttf
        font/otf;
    gzip_disable "msie6";

    # ====== 安全限制 ======
    client_max_body_size 20m;           # 上传文件最大20MB
    client_body_timeout 30s;            # 客户端发送请求体超时
    client_header_timeout 15s;          # 客户端发送请求头超时
    reset_timedout_connection on;       # 超时后重置连接（释放资源）

    # 隐藏Nginx版本号
    server_tokens off;

    upstream yujian_backend {
        # ip_hash 确保同一客户端始终路由到同一后端实例（WebSocket 粘性会话）
        # 单实例部署时 ip_hash 无影响，多实例时必须保留
        ip_hash;
        server 127.0.0.1:3000 fail_timeout=30s max_fails=3;
        # 多实例时取消下一行注释:
        # server 127.0.0.1:3001 fail_timeout=30s max_fails=3;
    }

    # HTTP → HTTPS 重定向（配置SSL后取消注释）
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }

    server {
        listen       80 default_server;
        # listen       443 ssl http2;  # 配置SSL后取消注释
        server_name  localhost;         # ⚠️ 改为你的域名或公网IP

        # SSL 证书（配置SSL后取消注释）
        # ssl_certificate     /etc/nginx/ssl/yujian.pem;
        # ssl_certificate_key /etc/nginx/ssl/yujian.key;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 1d;

        # ====== API + WebSocket 代理 ======
        location / {
            proxy_pass http://yujian_backend;
            proxy_http_version 1.1;

            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;   # WebSocket长连接24小时
            proxy_send_timeout 86400s;

            # 常规代理头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # 上游超时（API请求用，WebSocket不起作用因为上面的86400）
            proxy_connect_timeout 10s;

            # 缓冲配置（减少后端压力）
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
        }

        # ====== 上传文件静态服务 ======
        location /uploads/ {
            alias /home/app/yujian/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            # 安全：禁止执行上传目录中的脚本
            location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
                return 403;
            }
        }

        # ====== PWA静态资源 ======
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|webp)$ {
            proxy_pass http://yujian_backend;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        location = /manifest.json {
            proxy_pass http://yujian_backend;
            expires 1d;
        }

        location = /sw.js {
            proxy_pass http://yujian_backend;
            expires 1d;
            add_header Service-Worker-Allowed "/";
        }

        # ====== 健康检查不记录日志 ======
        location /health {
            proxy_pass http://yujian_backend;
            access_log off;
            proxy_connect_timeout 5s;
        }

        # ====== 禁止访问敏感文件 ======
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* (\.env|package.json|package-lock.json|schema.sql|\.git) {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ====== 错误页面 ======
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }

        error_page 404 /404.html;
        location = /404.html {
            root html;
        }
    }
}
