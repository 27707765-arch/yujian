<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF6B6B">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.png">
<title>遇见 - 同城社交</title>
<style>
/* ============ CSS Reset & Variables ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#FF5E7D;
  --primary-dark:#E84D6A;
  --primary-light:#FF8099;
  --primary-bg:#FFF0F3;
  --bg-white:#FFFFFF;
  --bg-page:#F5F5F7;
  --text:#1D1D1F;
  --text-secondary:#86868B;
  --text-muted:#AEAEB2;
  --text-white:#FFFFFF;
  --border:#E5E5EA;
  --border-light:#F2F2F7;
  --success:#34C759;
  --error:#FF3B30;
  --warning:#FF9500;
  --link:#007AFF;
  --gold:#FFD60A;
  --gold-dark:#E5BE00;
  --shadow-sm:0 1px 3px rgba(0,0,0,.04);
  --shadow:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --radius-xs:6px;
  --radius-sm:10px;
  --radius:16px;
  --radius-lg:20px;
  --radius-xl:24px;
  --nav-h:64px;
  --header-h:52px;
  --safe-b:env(safe-area-inset-bottom,0px)
}
html,body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  font-size:15px;color:var(--text);background:var(--bg-page);
  height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none
}

/* ============ Keyframes ============ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideLeft{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastIn{from{transform:translateY(-60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{from{transform:translateY(0);opacity:1}to{transform:translateY(-60px);opacity:0}}
@keyframes heartPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes heartBeat{0%{transform:scale(1)}25%{transform:scale(1.3)}50%{transform:scale(.95)}100%{transform:scale(1)}}
.heart-anim{animation:heartBeat .4s ease}
@keyframes skeletonShimmer{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
@keyframes matchBounce{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes coinDrop{0%{transform:translateY(-40px);opacity:0}50%{opacity:1}100%{transform:translateY(60px);opacity:0}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(0);opacity:1}to{transform:translateY(100%);opacity:0}}

/* ============ Vue Transition Classes ============ */
.slide-left-enter-active{animation:slideLeft .25s ease-out}
.slide-left-leave-active{animation:fadeIn .15s ease-in reverse}
.slide-up-enter-active{animation:slideUp .3s ease-out}
.slide-up-leave-active{animation:slideDown .3s ease-in}
.fade-enter-active{animation:fadeIn .2s ease-out}
.fade-leave-active{animation:fadeIn .15s ease-in reverse}

/* ============ App Shell ============ */
.app-container{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.app-header{
  height:var(--header-h);background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:center;
  padding:0 16px;z-index:100;flex-shrink:0
}
.app-header .title{font-size:17px;font-weight:700;color:var(--text)}
.back-btn{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border:none;background:none;font-size:20px;
  color:var(--primary);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center
}
.page-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.no-nav{padding-bottom:8px}
.page-content:not(.no-nav){padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px)}

/* ============ Bottom Navigation ============ */
.bottom-nav{
  height:var(--nav-h);background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border-light);display:flex;align-items:center;z-index:100;
  padding-bottom:var(--safe-b);flex-shrink:0
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text-muted);text-decoration:none;cursor:pointer;gap:3px;position:relative;transition:color .2s
}
.nav-item .nav-label{font-size:11px;font-weight:500}
.nav-item .nav-icon{font-size:24px;line-height:1}
.nav-item.active,.nav-item.router-link-active{color:var(--primary)}
.badge{
  position:absolute;top:2px;right:50%;transform:translateX(150%);
  background:var(--error);color:#fff;font-size:10px;min-width:18px;height:18px;
  border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;font-weight:700
}

/* ============ Buttons ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:12px 28px;border:none;border-radius:25px;font-size:16px;font-weight:600;
  cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);gap:6px;
  letter-spacing:.01em;position:relative;overflow:hidden
}
.btn:active{transform:scale(.97);filter:brightness(.95)}
.btn:disabled{opacity:.45;pointer-events:none;filter:grayscale(.3)}
.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:var(--text-white);box-shadow:0 4px 16px rgba(255,94,125,.3)
}
.btn-primary:hover{box-shadow:0 6px 24px rgba(255,94,125,.45);transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-sm{padding:7px 18px;font-size:13px;border-radius:20px}
.btn-lg{padding:16px 36px;font-size:18px;border-radius:30px}
.btn-block{width:100%}
.btn-ghost{background:transparent;border:none;color:var(--primary)}
.btn-danger{background:var(--error);color:var(--text-white);box-shadow:0 4px 12px rgba(255,59,48,.25)}

/* ============ Tags ============ */
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px}
.tag-primary{background:#FFF0F0;color:var(--primary)}
.tag-vip{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;font-weight:600}

/* ============ Form Inputs ============ */
.input-group{
  background:var(--bg-white);border-radius:var(--radius-sm);border:1.5px solid var(--border);
  padding:0 14px;display:flex;align-items:center;gap:10px;transition:border-color .2s
}
.input-group:focus-within{border-color:var(--primary)}
.input-group input{flex:1;border:none;outline:none;font-size:15px;padding:12px 0;background:transparent}

/* ============ Avatar ============ */
.avatar-circle{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,#f0f0f0,#e0e0e0);
  overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center
}
.avatar-circle img{width:100%;height:100%;object-fit:cover}
.avatar-default{font-size:22px}
.avatar-sm{width:36px;height:36px;font-size:16px}
.avatar-lg{width:64px;height:64px;font-size:28px}
.avatar-xl{width:80px;height:80px;font-size:36px}
.avatar-vip{border:2px solid #FFD700}

/* ============ User Card ============ */
.user-card{
  background:var(--bg-white);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);transition:transform .2s;display:flex;align-items:center;gap:16px
}
.user-card:active{transform:scale(.98)}

/* ============ Card & Layout ============ */
.card{background:var(--bg-white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.divider{height:1px;background:var(--border);margin:16px 0}
.info-row{display:flex;align-items:center;gap:6px}
.text-muted{font-size:12px;color:var(--text-muted)}
.tag-row{display:flex;gap:6px;flex-wrap:wrap}
.tab-bar{display:flex;gap:8px;margin-bottom:12px}
.action-bar{display:flex;gap:24px;font-size:13px;color:var(--text-muted)}
.card-item{
  display:flex;align-items:center;padding:14px 16px;background:var(--bg-white);
  border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;box-shadow:var(--shadow)
}

/* ============ Gradient Headers ============ */
.gradient-header-pink{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;padding:24px 20px
}
.gradient-header-purple{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;padding:32px 20px 24px;text-align:center
}

/* ============ Stat Bar ============ */
.stat-bar{display:flex;justify-content:center;gap:32px;margin-top:16px;font-size:14px}
.stat-item{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.stat-number{font-size:20px;font-weight:700}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:2px}

/* ============ Loading States ============ */
.loading-spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:16px auto
}
.global-loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(255,255,255,.85);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999
}
.loading-text{font-size:14px;color:var(--text-secondary);margin-top:12px}

/* ============ Error State ============ */
.error-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:48px 24px;text-align:center
}
.error-icon{font-size:64px;margin-bottom:16px;opacity:.6}
.error-message{font-size:17px;font-weight:600;margin-bottom:8px;color:var(--text)}
.error-hint{font-size:14px;color:var(--text-muted);margin-bottom:20px}

/* ============ Empty State ============ */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:48px 24px;text-align:center
}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:.6}
.empty-title{font-size:17px;font-weight:600;margin-bottom:8px;color:var(--text)}
.empty-desc{font-size:14px;color:var(--text-muted);margin-bottom:20px}

/* ============ Toast ============ */
.toast-container{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
  width:calc(100% - 32px);max-width:360px
}
.toast-item{
  padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;
  color:#fff;text-align:center;animation:toastIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)
}
.toast-leaving{animation:toastOut .3s forwards}
.toast-ok{background:var(--success)}
.toast-error{background:var(--error)}
.toast-warning{background:var(--warning)}
.toast-info{background:#0984E3}

/* ============ Message Bubbles ============ */
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;line-height:1.5;word-break:break-word;font-size:14px;margin-bottom:12px}
.msg-mine{border-radius:16px 16px 4px 16px;background:var(--primary);color:#fff;margin-left:auto}
.msg-other{border-radius:16px 16px 16px 4px;background:var(--bg-white);color:var(--text);box-shadow:var(--shadow);margin-right:auto}
.msg-system{text-align:center;font-size:13px;color:var(--text-muted);padding:8px 0}
.msg-image{max-width:200px;border-radius:8px;cursor:pointer}

/* ============ Chat Input ============ */
.chat-input-area{
  background:var(--bg-white);border-top:1px solid var(--border);
  padding:10px 12px;display:flex;gap:8px;align-items:flex-end;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px))
}

/* ============ Login Page ============ */
.login-page{
  height:100%;display:flex;flex-direction:column;background:var(--bg-white)
}
.logo-area{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;padding:40px 20px 30px;text-align:center;border-radius:0 0 30px 30px
}
.logo-icon{font-size:64px;margin-bottom:12px}

/* ============ Welcome Page ============ */
.welcome-page{
  height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:linear-gradient(135deg,#FF6B6B,#FF8E8E);
  color:#fff;text-align:center
}

/* ============ Skeleton Screens ============ */
.skeleton{
  background:linear-gradient(90deg,var(--border) 25%,#f5f5f5 37%,var(--border) 63%);
  background-size:200px 100%;animation:skeletonShimmer 1.5s ease-in-out infinite;
  border-radius:4px
}
.skeleton-avatar{width:48px;height:48px;border-radius:50%}
.skeleton-text{height:14px;margin-bottom:8px;width:100%}
.skeleton-text-short{height:14px;margin-bottom:8px;width:60%}
.skeleton-card{padding:16px;background:var(--bg-white);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow)}

/* ============ Image Preview ============ */
.image-preview-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#000;z-index:10000;display:flex;align-items:center;justify-content:center
}
.image-preview-img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .2s}
.image-preview-close{
  position:fixed;top:16px;right:16px;z-index:10001;
  width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);
  color:#fff;font-size:24px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
.image-preview-counter{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  color:#fff;font-size:14px;z-index:10001;background:rgba(0,0,0,.5);
  padding:4px 12px;border-radius:12px
}

/* ============ Match Modal ============ */
.match-modal{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.7);z-index:9998;
  display:flex;align-items:center;justify-content:center
}
.match-modal-content{
  background:var(--bg-white);border-radius:20px;padding:32px 24px;
  width:calc(100% - 48px);max-width:340px;text-align:center;
  animation:matchBounce .5s ease-out
}

/* ============ Media Query ============ */
@media(min-width:500px){
  .app-container,.page-content,.bottom-nav{max-width:500px;margin:0 auto}
  .toast-container{max-width:360px}
}

/* ============ Page Padding Utility ============ */
.page-padding{padding:12px 16px}

/* ============ List Items (通用列表项) ============ */
.list-item{
  display:flex;align-items:center;padding:12px;background:var(--bg-white);
  border-radius:var(--radius-sm);margin-bottom:6px;gap:12px;box-shadow:var(--shadow)
}
.list-item-avatar{width:44px;height:44px;border-radius:50%;background:var(--border);overflow:hidden;flex-shrink:0}
.list-item-avatar img{width:100%;height:100%;object-fit:cover}
.list-item-body{flex:1;min-width:0}
.list-item-title{font-weight:500}
.list-item-sub{font-size:12px;color:var(--text-muted)}
.list-item-arrow{color:var(--text-muted)}

/* ============ Chat Conversation Item ============ */
.conv-item{
  display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;
  border-bottom:1px solid var(--border);background:var(--bg-white)
}
.conv-avatar-wrap{position:relative;flex-shrink:0}
.conv-avatar{width:48px;height:48px;border-radius:50%;background:var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center}
.conv-avatar img{width:100%;height:100%;object-fit:cover}
.conv-avatar-placeholder{font-size:22px}
.conv-online-dot{
  position:absolute;bottom:2px;right:2px;width:10px;height:10px;
  background:var(--success);border:2px solid var(--bg-white);border-radius:50%
}
.conv-info{flex:1;min-width:0}
.conv-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.conv-name{font-weight:600;font-size:15px}
.conv-time{font-size:12px;color:var(--text-muted)}
.conv-msg-row{display:flex;justify-content:space-between;align-items:center}
.conv-preview{font-size:13px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80%}
.conv-badge{
  background:var(--error);color:#fff;font-size:11px;min-width:18px;height:18px;
  border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px
}

/* ============ Post Card (动态卡片) ============ */
.post-card{
  background:var(--bg-white);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);cursor:pointer;margin-bottom:12px
}
.post-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.post-card-avatar{width:40px;height:40px;border-radius:50%;background:var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.post-card-avatar img{width:100%;height:100%;object-fit:cover}
.post-card-user{flex:1}
.post-card-username{font-weight:600;font-size:15px}
.post-card-time{font-size:12px;color:var(--text-muted)}
.post-card-body{margin-bottom:10px;line-height:1.6;font-size:15px}
.post-card-images{display:grid;gap:4px;margin-bottom:10px}
.post-card-images img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px}
.post-card-actions{display:flex;gap:24px;font-size:13px;color:var(--text-muted)}
.post-card-actions span{cursor:pointer}

/* ============ Home User Card (遇见列表) ============ */
.home-user-card{
  display:flex;align-items:center;padding:12px;background:var(--bg-white);
  border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer
}
.home-user-avatar{width:60px;height:60px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea,#764ba2)}
.home-user-avatar img{width:100%;height:100%;object-fit:cover}
.home-user-avatar-placeholder{font-size:28px}
.home-user-info{flex:1;min-width:0;margin:0 12px}
.home-user-name-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.home-user-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home-user-meta{font-size:13px;color:var(--text-secondary)}
.home-user-detail{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);margin-bottom:6px}
.home-user-tags{display:flex;gap:6px;flex-wrap:wrap}
.home-user-actions{display:flex;flex-direction:column;gap:10px;flex-shrink:0}

/* ============ Action Buttons (圆形操作按钮) ============ */
.action-btn-circle{
  width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)
}
.action-btn-skip{border:1px solid var(--border);background:var(--bg-white)}
.action-btn-like{border:none;background:linear-gradient(135deg,#FF6B6B,#FF8E8E);color:#fff}

/* ============ Filter Panel ============ */
.filter-panel{
  background:var(--bg-white);padding:16px;border-radius:var(--radius);
  margin-bottom:12px;box-shadow:var(--shadow)
}
.filter-row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.filter-label{font-size:13px;color:var(--text-secondary)}
.filter-input{width:60px;padding:6px;border:1px solid var(--border);border-radius:6px;text-align:center}

/* ============ Profile Page (用户主页) ============ */
.profile-section{
  margin:0 16px 12px;padding:16px;background:var(--bg-white);
  border-radius:var(--radius-sm);box-shadow:var(--shadow)
}
.profile-section h4{margin-bottom:8px;font-size:14px;color:var(--text-secondary)}
.profile-actions{display:flex;gap:12px;padding:16px}

/* ============ Edit Profile ============ */
.form-field{margin-bottom:12px}
.form-label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:6px}
.form-field-row{display:flex;gap:12px}
.form-field-row .form-field{flex:1}
.tag-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tag-option{cursor:pointer;padding:6px 14px;border:1px solid var(--border);border-radius:16px;font-size:13px}
.avatar-upload-area{
  text-align:center;margin-bottom:20px
}
.avatar-upload-box{
  width:80px;height:80px;border-radius:50%;background:var(--border);
  margin:0 auto;overflow:hidden;border:3px dashed var(--border);
  display:flex;align-items:center;justify-content:center
}
.avatar-upload-box img{width:100%;height:100%;object-fit:cover}
.avatar-upload-hint{font-size:12px;color:var(--text-muted);margin-top:8px}

/* ============ Vip / Recharge Cards ============ */
.vip-header{text-align:center;margin-bottom:24px}
.vip-header-icon{font-size:48px}
.pkg-card{
  background:var(--bg-white);border-radius:var(--radius);padding:20px;
  margin-bottom:12px;box-shadow:var(--shadow);text-align:center
}
.pkg-price{font-size:28px;font-weight:700;color:var(--primary)}
.pkg-name{font-size:15px;margin:8px 0}
.pkg-duration{font-size:13px;color:var(--text-muted);margin-bottom:16px}
.privilege-box{
  margin-top:20px;padding:16px;background:var(--bg-white);
  border-radius:var(--radius-sm);box-shadow:var(--shadow)
}
.privilege-box h4{margin-bottom:8px}
.privilege-list{font-size:13px;color:var(--text-secondary);margin-top:8px;line-height:2}

/* ============ Recharge Page ============ */
.recharge-header{text-align:center;margin-bottom:24px}
.recharge-header-icon{font-size:48px}
.recharge-rate{color:var(--text-muted);font-size:13px}
.amount-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.amount-card{
  padding:20px;border-radius:var(--radius);text-align:center;cursor:pointer;
  border:2px solid var(--border);transition:all .2s;background:var(--bg-white)
}
.amount-card.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
.amount-value{font-size:24px;font-weight:700}
.amount-coins{font-size:12px;margin-top:4px}
.amount-card.selected .amount-coins{color:rgba(255,255,255,.8)}
.amount-card:not(.selected) .amount-coins{color:var(--text-muted)}
.pay-methods{display:flex;gap:12px;margin-top:20px}
.pay-methods .btn{flex:1}

/* ============ Earnings Page ============ */
.earnings-hero{
  background:linear-gradient(135deg,#FF6B6B,#FF8E8E);color:#fff;
  padding:24px;border-radius:var(--radius);text-align:center;margin-bottom:16px
}
.earnings-hero-label{font-size:13px;opacity:.8}
.earnings-hero-amount{font-size:36px;font-weight:700;margin:8px 0}
.earnings-hero-balance{font-size:13px;opacity:.8}
.tx-item{
  display:flex;align-items:center;padding:12px;background:var(--bg-white);
  border-radius:var(--radius-sm);margin-bottom:6px;box-shadow:var(--shadow)
}
.tx-icon{font-size:24px;margin-right:12px;flex-shrink:0}
.tx-info{flex:1}
.tx-desc{font-size:14px}
.tx-time{font-size:11px;color:var(--text-muted)}
.tx-amount{font-weight:600}
.tx-positive{color:var(--success)}
.tx-negative{color:var(--error)}

/* ============ Settings / Menu Item ============ */
.menu-item{
  display:flex;align-items:center;padding:14px 16px;background:var(--bg-white);
  border-radius:var(--radius-sm);margin-bottom:6px;box-shadow:var(--shadow)
}
.menu-item-icon{font-size:20px;margin-right:12px}
.menu-item-text{flex:1}
.menu-item-label{font-size:15px}
.menu-item-desc{font-size:12px;color:var(--text-muted)}
.menu-item-arrow{color:var(--text-muted)}

/* ============ MyPage ============ */
.my-header{
  background:linear-gradient(135deg,#FF6B6B,#FF8E8E);color:#fff;padding:24px 20px
}
.my-header-row{display:flex;align-items:center;gap:16px}
.my-avatar{
  width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;font-size:32px;
  overflow:hidden;border:3px solid rgba(255,255,255,.5);flex-shrink:0
}
.my-avatar img{width:100%;height:100%;object-fit:cover}
.my-info{flex:1}
.my-name{font-size:20px;font-weight:600}
.my-bio{font-size:13px;opacity:.8;margin-top:4px}
.my-vip-tag{background:rgba(255,255,255,.3);color:#fff}
.my-stat-row{
  display:flex;gap:16px;margin-top:16px;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.2)
}
.my-stat{flex:1;text-align:center}
.my-stat-val{font-size:22px;font-weight:700}
.my-stat-label{font-size:11px;opacity:.8}
.my-logout-area{padding:16px}

/* ============ Login Page ============ */
.login-form-area{flex:1;padding:30px 20px}
.login-agreement{text-align:center;margin-top:24px;font-size:12px;color:var(--text-muted)}
.login-agreement span{color:var(--primary);cursor:pointer}

/* ============ Misc Utilities ============ */
.flex-center{display:flex;align-items:center;justify-content:center}
.text-center{text-align:center}
.relative{position:relative}
.mt-12{margin-top:12px}
.mb-12{margin-bottom:12px}
.gap-8{gap:8px}
.gap-12{gap:12px}
</style>
</head>
<body>
<div id="app"></div>

<script src="/js/vue.global.js"></script>
<script src="/js/vue-router.global.js"></script>
<script src="/js/yujian-app.js"></script>
</body>
</html>
